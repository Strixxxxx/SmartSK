name: Build and Deploy Docker app to Azure Web App - smartSK-backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      # Checkout code
      - uses: actions/checkout@v4

      # Log in to Azure
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F3C59CAD920D4D2488E5081F5E02AD69 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_86BBADAEAA6540C697C5CF8E2ABC0EE1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D1E9DCD73D244760B3990633D375E2AE }}

      # Log in to Azure Container Registry (ACR)
      - name: Azure Container Registry Login
        uses: azure/docker-login@v1
        with:
          login-server: smartskregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # Build & push Docker image (with no cache)
      - name: Build and Push Docker image
        working-directory: ./backend
        run: |
          echo "Building Docker image..."
          docker build --no-cache -t smartskregistry.azurecr.io/smartsk-backend:${{ github.sha }} .
          docker push smartskregistry.azurecr.io/smartsk-backend:${{ github.sha }}

          # Tag and push latest for convenience
          docker tag smartskregistry.azurecr.io/smartsk-backend:${{ github.sha }} smartskregistry.azurecr.io/smartsk-backend:latest
          docker push smartskregistry.azurecr.io/smartsk-backend:latest
          echo "Docker image built and pushed successfully."

      # Deploy App Service with new image
      - name: Deploy to Azure Web App (Docker)
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'smartSK-backend'
          slot-name: 'Production'
          images: 'smartskregistry.azurecr.io/smartsk-backend:${{ github.sha }}'
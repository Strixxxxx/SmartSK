name: Build and Deploy Backend

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure CLI - show account
        run: az account show

      - name: Build and Push Docker image
        run: |
          IMAGE_NAME=smartskregistry.azurecr.io/smartsk-backend
          GIT_SHA=${{ github.sha }}

          echo "Building Docker image..."
          docker build -f backend/Dockerfile -t $IMAGE_NAME:$GIT_SHA -t $IMAGE_NAME:latest ./backend

          echo "Pushing Docker image..."
          docker push $IMAGE_NAME:$GIT_SHA
          docker push $IMAGE_NAME:latest

      - name: Deploy to Azure Web App
        run: |
          az webapp config container set \
            --name smartsk-backend-container \
            --resource-group Smart_SK \
            --docker-custom-image-name smartskregistry.azurecr.io/smartsk-backend:latest \
            --enable-app-service-storage false


name: Build and Deploy Backend

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow runs
        uses: actions/delete-workflow-runs@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          keep_minimum_runs: 50

  build-and-deploy:
    needs: cleanup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure CLI - show account
        run: az account show

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: smartskregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Docker image
        run: |
          IMAGE_NAME=smartskregistry.azurecr.io/smartsk-backend
          GIT_SHA=${{ github.sha }}

          echo "Building Docker image..."
          docker build -f backend/Dockerfile -t $IMAGE_NAME:$GIT_SHA -t $IMAGE_NAME:latest ./backend

          echo "Pushing Docker image with SHA tag..."
          docker push $IMAGE_NAME:$GIT_SHA
          
          echo "Pushing Docker image with latest tag..."
          docker push $IMAGE_NAME:latest

      - name: Update Azure Web App Configuration
        run: |
          GIT_SHA=${{ github.sha }}
          echo "Updating Web App to use image with SHA: $GIT_SHA"
          
          az webapp config container set \
            --name smartsk-backend-container \
            --resource-group Smart_SK \
            --docker-custom-image-name smartskregistry.azurecr.io/smartsk-backend:latest \
            --enable-app-service-storage false

      - name: Restart Azure Web App
        run: |
          echo "Restarting Web App to pull new image..."
          az webapp restart \
            --name smartsk-backend-container \
            --resource-group Smart_SK
# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and Deploy Node.js app to Azure Web App - smartSK-backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: npm install, build, and test (backend)
        working-directory: ./backend
        run: |
          npm install
          npm run build --if-present

      - name: Zip artifact for deployment (backend)
        working-directory: ./backend
        run: zip -r ../release.zip .

      - name: Upload artifact for deployment job (backend)
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

      # Try Docker build with manual registry login
      - name: Build Docker Image (Test)
        working-directory: ./backend
        run: |
          echo "Building Docker image..."
          docker build -t smartsk-backend:latest .
          echo "Docker build completed successfully"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F3C59CAD920D4D2488E5081F5E02AD69 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_86BBADAEAA6540C697C5CF8E2ABC0EE1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D1E9DCD73D244760B3990633D375E2AE }}

      - name: 'Deploy to Azure Web App (Node.js)'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'smartSK-backend'
          slot-name: 'Production'
          package: ./release.zip

      # Commented out Docker deployment until registry access is fixed
      - name: 'Deploy to Azure Web App (Docker)'
        id: deploy-to-webapp-docker
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'smartSK-backend'
          slot-name: 'Production'
          images: 'smartskregistry.azurecr.io/smartsk-backend:${{ github.sha }}'
# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and Deploy Node.js app to Azure Web App - smartSK-backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # Docker Build Steps
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure CLI
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F3C59CAD920D4D2488E5081F5E02AD69 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_86BBADAEAA6540C697C5CF8E2ABC0EE1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D1E9DCD73D244760B3990633D375E2AE }}

      - name: Login to Azure Container Registry
        run: az acr login --name smartskregistry

      - name: Build and push container image to registry
        run: |
          docker build ./backend -t smartskregistry.azurecr.io/smartsk-backend:${{ github.sha }}
          docker push smartskregistry.azurecr.io/smartsk-backend:${{ github.sha }}

      # Node.js Build Steps (Fallback)
      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Clean install dependencies
        working-directory: ./backend
        run: |
          npm ci --production --no-optional
          npm list --depth=0

      - name: Verify Azure Storage Blob installation
        working-directory: ./backend
        run: |
          echo "Checking @azure/storage-blob installation..."
          npm list @azure/storage-blob
          ls -la node_modules/@azure/ || echo "No @azure modules found"

      - name: Remove unnecessary files
        working-directory: ./backend
        run: |
          find node_modules -name "*.md" -delete 2>/dev/null || true
          find node_modules -name "test*" -type d -exec rm -rf {} + 2>/dev/null || true
          find node_modules -name "*.map" -delete 2>/dev/null || true

      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-app
          path: ./backend
          compression-level: 6

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-app
          path: ./backend

      - name: Verify node_modules before packaging
        run: |
          ls -la ./backend/node_modules | head

      - name: Create deployment zip
        run: |
          cd backend
          zip -r ../smartsk-backend.zip .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F3C59CAD920D4D2488E5081F5E02AD69 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_86BBADAEAA6540C697C5CF8E2ABC0EE1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D1E9DCD73D244760B3990633D375E2AE }}

      # Comment out this step when you're ready to use Docker deployment
      - name: Deploy to Azure Web App (Node.js fallback)
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'smartSK-backend'
          slot-name: 'Production'
          package: ./smartsk-backend.zip

      # Uncomment this step when you're ready to switch to Docker deployment
      - name: Deploy to Azure Web App (Docker)
        id: deploy-to-webapp-docker
        uses: azure/webapps-deploy@v3
        with:
         app-name: 'smartSK-backend'
         slot-name: 'Production'
         images: 'smartskregistry.azurecr.io/smartsk-backend:${{ github.sha }}'
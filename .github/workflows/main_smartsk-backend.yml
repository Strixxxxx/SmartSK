name: Build and Deploy Docker app to Azure Web App - smartSK-backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Login to Azure using OIDC + secrets
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Build & push Docker image to ACR
      - name: Build and Push Docker image
        run: |
          IMAGE_NAME=smartskregistry.azurecr.io/smartsk-backend
          GIT_SHA=${{ github.sha }}

          echo "Building Docker image..."
          docker build -t $IMAGE_NAME:$GIT_SHA -t $IMAGE_NAME:latest ./backend

          echo "Pushing Docker image..."
          docker push $IMAGE_NAME:$GIT_SHA
          docker push $IMAGE_NAME:latest

      # Deploy to Azure Web App (App Service will pull via Managed Identity)
      - name: Deploy to Azure Web App
        run: |
          az webapp config container set \
            --name smartsk-backend-container \
            --resource-group Smart_SK \
            --docker-custom-image-name smartskregistry.azurecr.io/smartsk-backend:latest \
            --enable-app-service-storage false


version: '3.8'

services:
  backend-node:
    image: smartskacr.azurecr.io/smartsk-backend:latest
    restart: always
    ports:
      - "8000:8000"
    environment:
      - NODE_PORT=8000
      - AI_SERVICE_URL=http://ai-service:8080
    depends_on:
      - ai-service
    networks:
      - smartsk-net

  ai-service:
    image: smartskacr.azurecr.io/smartsk-ai:latest
    restart: always
    environment:
      - PY_PORT=8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - smartsk-net

networks:
  smartsk-net:
    driver: bridge
